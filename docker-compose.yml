services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/youmed
      - DB_USERNAME=postgres
      - DB_PASSWORD=Lin281004@
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:17
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=youmed
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Lin281004@
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  frontend:
    build:
      context: ../yomed-frontend
    ports:
      - "5173:80"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data: